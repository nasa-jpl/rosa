# Turtlesim default window: x and y span [0, 11] (inclusive). Walls as four edges
# for use with circle-vs-segment collision checks (collision_geometry.any_segment_intersects_disc).
obstacles:
  - id: wall-south
    kind: static
    geometry:
      type: segments
      segments:
        - [ [ 0.0, 0.0 ], [ 11.0, 0.0 ] ]
  - id: wall-east
    kind: static
    geometry:
      type: segments
      segments:
        - [ [ 11.0, 0.0 ], [ 11.0, 11.0 ] ]
  - id: wall-north
    kind: static
    geometry:
      type: segments
      segments:
        - [ [ 11.0, 11.0 ], [ 0.0, 11.0 ] ]
  - id: wall-west
    kind: static
    geometry:
      type: segments
      segments:
        - [ [ 0.0, 11.0 ], [ 0.0, 0.0 ] ]
  - id: wet
    kind: static
    geometry:
      type: aabb
      min_x: 5.0
      min_y: 4.0
      max_x: 7.0
      max_y: 6.0
  - id: a-point
    kind: static
    geometry:
      type: circle
      cx: 1.0
      cy: 5.0
      r: 0.25
  - id: b-point
    kind: static
    geometry:
      type: circle
      cx: 10.0
      cy: 5.0
      r: 0.25
  - id: c-point
    kind: static
    geometry:
      type: circle
      cx: 6.0
      cy: 7.0
      r: 0.25
